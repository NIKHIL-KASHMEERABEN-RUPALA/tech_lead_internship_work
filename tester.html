<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Devantra Hiring</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar navbar-dark bg-dark px-3">
    <img src="https://via.placeholder.com/40" alt="logo" height="40">
    <input type="text" class="form-control w-50 mx-3" placeholder="Search...">
    <button class="btn btn-outline-light">Sign Up</button>
  </nav>

  <div class="container-fluid mt-3 text-white">
    <div class="row">


      <div class="col-md-2 sidebar p-3">
        <div class="text-center">
          <p class="text-light">About Us</p>
          <button class="btn btn-outline-light w-100 mb-2">Sign Up</button>
          <button class="btn btn-light w-100">Login</button>
        </div>
        <ul class="nav flex-column mt-4">
          <li class="nav-item"><a class="nav-link active" href="#">🏠 Home</a></li>
          <li class="nav-item"><a class="nav-link" href="#">About Us</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Challenges</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Roadmap</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Calendar</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Contact Us</a></li>
        </ul>
      </div>

      <div class="col-md-7">
        <div class="d-flex mb-3">
          <button class="btn btn-outline-light me-2">Relevant</button>
          <button class="btn btn-outline-secondary me-2">Latest</button>
          <button class="btn btn-outline-secondary">Top</button>
        </div>
        <div class="card bg-secondary text-white mb-3">
          <div class="card-body">
            <h4 class="card-title fw-bold">Devantra is Hiring!</h4>
            <img src="https://via.placeholder.com/600x200/CCE5FF/000?text=Hiring+Banner" class="img-fluid my-3" alt="Hiring Banner">
            <div class="d-flex justify-content-between align-items-center">
              <div>
                <span class="vote">⬆️⬇️</span>
                <span>Share • Comment</span>
              </div>
              <button class="btn btn-primary" onclick="register()">Register 🔗</button>
            </div>
          </div>
        </div>
      </div>

      <div class="col-md-3 sidebar p-3">
        <div class="mb-4">
          <h5 class="fw-bold">Hackathons<br>Competition<br>Live Events</h5>
          <p>Pan India / Global</p>
          <span class="position-absolute top-0 end-0 p-2 fs-5">🔔</span>
        </div>
        <div>
          <h5 class="fw-bold">#discuss</h5>
          <div class="text-end mt-2">
            <button class="btn btn-sm btn-light" onclick="toggleTheme()">🌞</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
